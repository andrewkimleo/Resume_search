ai_usage_summary: |
  Used Gemini as an AI coding assistant (Antigravity) to build the data processing pipelines, optimize the ranking algorithms for low memory constraints (streaming JSON parsing with heap-based top-K extraction), and ensure adherence to compute constraints.

methodology_summary: |
  Fully offline, rule-based ranker designed for strict computational constraints (streaming 100K candidates under 5 mins without high memory load). It evaluates five core pillars: Core Skills match (with trust multipliers on years used/endorsements), Experience match, Title relevance, and a powerful Behavioral Modifier derived from Redrob signals (recruiter response rate, GitHub activity, interview completion rate). It implements a strict Honeypot Disqualification protocol to filter impossible profiles (e.g. 0 years used but expert proficiency). 

